name: ACL2 Proof Certification

on:
  push:
    branches: [ master, main ]
    paths:
      - '**.lisp'
      - '**.md'
      - 'sources/**'
      - 'tools/**'
      - 'scripts/**'
      - '.github/workflows/acl2-proofs.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - '**.lisp'
      - '**.md'
      - 'sources/**'
      - 'tools/**'

jobs:
  validate-traces:
    name: Validate Source Traces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run trace validator
        env:
          PROJECT_ROOT: .
        run: python tools/validate_trace.py

  repo-check:
    name: Verify Review Documents
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required review documents
        run: |
          missing=0
          for f in CERTIFICATION.md PROOF_TOUR.md TOP_5_THEOREMS.md \
                   RIGOR_NOTES.md \
                   reports/axiom_inventory.md \
                   reports/certification_status.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=$((missing + 1))
            else
              echo "OK: $f"
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "ERROR: $missing required review document(s) missing."
            exit 1
          fi

      - name: Check defaxiom trace coverage
        run: |
          # Count defaxioms in .lisp files
          axiom_count=$(grep -rh '(defaxiom ' *.lisp | wc -l)
          # Count trace rows (minus header)
          trace_count=$(($(wc -l < sources/clause_trace.csv) - 1))
          echo "defaxioms in .lisp: $axiom_count"
          echo "trace rows in CSV: $trace_count"
          if [ "$trace_count" -lt "$axiom_count" ]; then
            echo "ERROR: Not all defaxioms have trace entries ($trace_count < $axiom_count)"
            exit 1
          fi
          echo "OK: trace coverage adequate"

  certify:
    name: Certify ACL2 Books
    runs-on: ubuntu-latest
    needs: [validate-traces, repo-check]

    env:
      ACL2_CMD: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create log directory
        run: mkdir -p logs/certify

      - name: Pull ACL2 Docker image
        run: docker pull atwalter/acl2:latest

      # === Layer 0: Base clean books (no defaxiom) ===
      - name: certify-book core
        run: |
          echo '(certify-book "hb1384_core" ?)' | $ACL2_CMD 2>&1 | tee logs/certify/core.log
          test -f hb1384_core.cert

      - name: certify-book process
        run: |
          echo '(certify-book "hb1384_process" ?)' | $ACL2_CMD 2>&1 | tee logs/certify/process.log
          test -f hb1384_process.cert

      # === Layer 1: Process invariants (no defaxiom) ===
      - name: certify-book process_invariants
        run: |
          echo '(certify-book "hb1384_process_invariants" ?)' | $ACL2_CMD 2>&1 | tee logs/certify/process_invariants.log
          test -f hb1384_process_invariants.cert

      # === Layer 2: Consistency check (no defaxiom) ===
      - name: certify-book consistency_check
        run: |
          echo '(certify-book "hb1384_consistency_check" ?)' | $ACL2_CMD 2>&1 | tee logs/certify/consistency_check.log
          test -f hb1384_consistency_check.cert

      # === Layer 3: Facts (defaxioms-okp) ===
      - name: certify-book facts (defaxioms-okp)
        run: |
          echo '(certify-book "hb1384_facts" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/facts.log
          test -f hb1384_facts.cert

      # === Layer 4: Hinge books (defaxioms-okp) ===
      - name: certify-book hinge_void_challenge (defaxioms-okp)
        run: |
          echo '(certify-book "hb1384_hinge_void_challenge" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/hinge_void_challenge.log
          test -f hb1384_hinge_void_challenge.cert

      - name: certify-book hinge_election_date (defaxioms-okp)
        run: |
          echo '(certify-book "hb1384_hinge_election_date" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/hinge_election_date.log
          test -f hb1384_hinge_election_date.cert

      # === Layer 5: Interpretive models (defaxioms-okp) ===
      - name: certify-book challenger_model (defaxioms-okp)
        run: |
          echo '(certify-book "hb1384_challenger_model" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/challenger_model.log
          test -f hb1384_challenger_model.cert

      - name: certify-book commonwealth_model (defaxioms-okp)
        run: |
          echo '(certify-book "hb1384_commonwealth_model" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/commonwealth_model.log
          test -f hb1384_commonwealth_model.cert

      # === Verification ===
      - name: Verify all .cert files exist
        run: |
          echo "=== Certification Verification ==="
          total=0; missing=0
          for f in \
            hb1384_core \
            hb1384_process \
            hb1384_process_invariants \
            hb1384_consistency_check \
            hb1384_facts \
            hb1384_hinge_void_challenge \
            hb1384_hinge_election_date \
            hb1384_challenger_model \
            hb1384_commonwealth_model; do
            total=$((total + 1))
            if [ -f "${f}.cert" ]; then
              echo "✅ ${f}.cert"
            else
              echo "❌ ${f}.cert MISSING"
              missing=$((missing + 1))
            fi
          done
          echo ""
          echo "TOTAL: $total books, $((total - missing)) certified, $missing missing"
          [ "$missing" -eq 0 ] || exit 1

      - name: Upload certification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: certify-book-logs
          path: logs/certify/*.log
          retention-days: 30
